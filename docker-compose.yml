version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=kiwi_db
      - POSTGRES_USER=kiwi
      - POSTGRES_PASSWORD=kiwi
    volumes:
      - db_data:/var/lib/postgresql/data
  web:
    image: kiwitcms/kiwi:latest
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - KIWI_DB_NAME=kiwi_db
      - KIWI_DB_USER=kiwi
      - KIWI_DB_PASSWORD=kiwi
      - KIWI_DB_HOST=db
volumes:
  db_data: